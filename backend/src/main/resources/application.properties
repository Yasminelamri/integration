spring.application.name=jungledraft
server.port=9090

# ============ DATABASE CONFIG ============
spring.datasource.url=jdbc:mysql://localhost:3306/club_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ============ JPA/HIBERNATE CONFIG ============
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

app.upload.dir=uploads/photos
app.photo.max-size=5242880
app.photo.allowed-formats=jpg,jpeg,png