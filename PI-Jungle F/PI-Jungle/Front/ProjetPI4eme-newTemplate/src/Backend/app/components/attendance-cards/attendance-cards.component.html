<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
  <div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm flex items-center gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-gray-100 text-primary">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 01-12 0v1zm0 0h-6m6 0V7" />
      </svg>
    </div>
    <div>
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Total Students</div>
      <div class="text-xl font-bold text-gray-900">{{ totalStudents }}</div>
      <p class="text-xs text-gray-500 mt-1">Students with attendance records</p>
    </div>
  </div>

  <div class="rounded-xl border border-gray-200 bg-green-50 p-4 shadow-sm flex items-center gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-green-100 text-green-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <div>
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Present Today</div>
      <div class="text-xl font-bold text-green-700">{{ presentCount }}</div>
      <p class="text-xs text-gray-500 mt-1">Marked as present for loaded sessions</p>
    </div>
  </div>

  <div class="rounded-xl border border-gray-200 bg-red-50 p-4 shadow-sm flex items-center gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-red-100 text-red-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <div>
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Absent Today</div>
      <div class="text-xl font-bold text-red-700">{{ absentCount }}</div>
      <p class="text-xs text-gray-500 mt-1">Marked as absent for loaded sessions</p>
    </div>
  </div>

  <div class="rounded-xl border border-gray-200 bg-primary/5 p-4 shadow-sm flex items-center gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-primary text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <div>
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Attendance Rate</div>
      <div class="text-xl font-bold text-primary">{{ attendanceRate }}%</div>
      <p class="text-xs text-gray-500 mt-1">Average attendance across students</p>
    </div>
  </div>
</div>
